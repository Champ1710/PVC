name: Deployment Pipeline

on:
  push:
    branches:
      - main  # Change if needed

jobs:
  deploy-to-DEV:
    name: Deploy to DEV
    runs-on: self-hosted  # Runs on Monroe/Azure runner
    environment: DEV
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DEV Server
        run: |
          echo "Deploying to DEV..."
          sftp svc_pvcs@10.239.110.19 <<EOF
          put -r .github/workflows/champ.yml*
          bye
          EOF
  deploy-to-qa:
    name: Deploy to QA
    runs-on: self-hosted  # Runs on Monroe/Azure runner
    environment: QA
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to QA Server
        run: |
          echo "Deploying to QA..."
          sftp qaadmin@10.239.80.211 <<EOF
          put -r .github/workflows/champ.yml* \schd_bncom\*
          bye
          EOF
  deploy-to-qa3:
     name: Deploy to QA3
     needs: deploy-to-qa
     runs-on: self-hosted  # Runs on Monroe/Azure runner
     environment: QA3
     steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to QA3 Server
        run: |
          echo "Deploying to QA3..."
          sftp qaadmin@10.239.80.212 <<EOF
          put -r .github/workflows/champ.yml* \schd_bncom\*
          bye
          EOF

  approve-prod:
    name: Approval for Production Deployment
    needs: deploy-to-qa
    runs-on: ubuntu-latest
    environment: Prod
    steps:
      - name: Wait for Manual Approval
        run: echo "Manual approval required in GitHub UI"

  deploy-to-prod:
    name: Deploy to Production
    needs: approve-prod
    runs-on: self-hosted
    environment: Prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production Server
        run: |
          echo "Deploying to Production..."
          sftp qaadmin@10.237.80.211 <<EOF
          put -r .github/workflows/champ.yml* \schd_bncom\*
          bye
          EOF

  deploy-to-end-user:
    name: Deploy to End User
    needs: deploy-to-prod
    runs-on: self-hosted
    environment: EndUser
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to End User Machine
        run: |
          echo "Deploying to End User..."
          sftp enduser@10.0.0.50 <<EOF
          put -r .github/workflows/champ.yml*
          bye
          EOF
